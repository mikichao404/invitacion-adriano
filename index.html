<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Invitación Bomberman!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- AUDIOS -->
    <audio id="bgMusic" src="sounds/musica-fondo.mp3" loop></audio>
    <audio id="bombSound" src="sounds/explosion.mp3"></audio>
    <audio id="cakeSound" src="sounds/victoria.wav"></audio>

    <!-- PANTALLA DE INICIO -->
    <div id="welcome-screen" class="panel-inicio">
        <h2>🎮 ¡HOLA JUGADOR! 🎮</h2>
        <p>Introduce tu nombre para empezar la misión:</p>
        <input type="text" id="userName" placeholder="Tu nombre aquí...">
        <br><br>
        <button onclick="empezarJuego()" class="btn-inicio">EMPEZAR NIVEL 💣</button>

        <div class="ranking-preview">
            <h3>🏆 TOP 10 JUGADORES</h3>
            <div id="ranking-list"></div>
        </div>
    </div>

    <!-- CONTENEDOR DEL JUEGO -->
    <div id="game-container" style="display: none;">
        <h1>¡Misión: Encuentra la Torta 🎂</h1>

        <div class="hud">
            <div class="hud-item">❤️ Vidas: <span id="vidas">3</span></div>
            <div class="hud-item">⏱️ Tiempo: <span id="tiempo">0</span>s</div>
            <div class="hud-item">💣 Intentos: <span id="intentos">0</span></div>
        </div>

        <p id="instrucciones">Encuentra la torta escondida antes de quedarte sin vidas.</p>
        <div id="grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
